name: Build macOS app (py2app)

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# Две сборки: arm64 (M1/M2/M3) и x86_64 (Intel). Нативные .so (Pillow и др.)
# привязаны к архитектуре — одна .app не подходит для обеих.

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            artifact-name: slicer-macos-app-arm64
          - runs-on: macos-15-intel
            artifact-name: slicer-macos-app-intel

    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show architecture
        run: |
          uname -m
          python -c "import platform; print(platform.machine())"

      - name: Setup Python 3.11.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.8"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install py2app

      - name: Build .app with py2app
        run: python setup_py2app.py py2app

      - name: Zip app bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent slicer.app slicer.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/slicer.app.zip
          if-no-files-found: error
